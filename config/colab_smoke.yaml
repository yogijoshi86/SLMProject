# Colab smoke-run config: validate the full pipeline end-to-end on a free T4 GPU.
# Overrides default.yaml for a fast, low-memory pass. Once this works, use default.yaml
# for the full run (on a bigger GPU, or expect a long T4 run).

seed: 42

paths:
  artifacts_dir: artifacts
  embeddings: artifacts/unsafe_embeddings_smoke.pt
  taxonomy: artifacts/prototypes_taxonomy_smoke.json
  benchmark: artifacts/benchmark_test_set.json
  eval_logs: artifacts/eval_logs.csv

data:
  dataset_name: lmsys/toxic-chat
  dataset_config: toxicchat0124
  split: train
  text_column: user_input
  max_samples: 500          # cap for a minutes-not-hours smoke run

model:
  name: meta-llama/Llama-Guard-3-8B
  dtype: int8               # fp16 8B OOMs on a 15 GB T4; int8 fits (~9 GB)
  device_map: auto
  max_new_tokens: 20
  hidden_layer: -1

extraction:
  batch_size: 4             # conservative for T4 memory headroom
  max_length: 2048

clustering:
  k_min: 3
  k_max: 15
  k_cap: 10
  n_init: 10
  top_exemplars: 5

explainer:
  provider: openai
  openai_model: gpt-4o
  anthropic_model: claude-3-5-sonnet-20241022
  temperature: 0.2
  ood_similarity_floor: 0.35
  latency_budget_seconds: 1.5

evaluation:
  n_false_positives: 15
  n_false_negatives: 15
  n_participants: 6
